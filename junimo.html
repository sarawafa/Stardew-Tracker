<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junimo Master Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta name="referrer" content="no-referrer">

    <style>
        :root {
            --stardew-yellow: #fcf1c5;
            --stardew-brown: #7d5233;
            --stardew-dark-brown: #4a311f;
            --stardew-gold-border: #e8b059;
            --stardew-panel: #ce915c;
            --stardew-green: #4da33c;
        }

        body {
            background-color: #2c3e50;
            background-image: radial-gradient(#34495e 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Press Start 2P', cursive;
            color: var(--stardew-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            font-size: 10px;
        }

        .stardew-panel {
            background-color: var(--stardew-panel);
            border: 4px solid var(--stardew-dark-brown);
            outline: 4px solid var(--stardew-gold-border);
            box-shadow: 0 10px 0 rgba(0,0,0,0.3);
            padding: 20px;
            margin: 15px;
            position: relative;
        }

        h1 { color: var(--stardew-yellow); text-shadow: 3px 3px 0 #000; font-size: 18px; text-align: center; margin-bottom: 20px;}

        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; }

        .pill, .tab-btn {
            padding: 10px;
            border: 3px solid var(--stardew-dark-brown);
            background: var(--stardew-yellow);
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: var(--stardew-brown);
            transition: all 0.1s;
        }

        .pill.active, .tab-btn.active { background: var(--stardew-green); color: white; border-color: var(--stardew-yellow); }

        #room-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .bundle-header {
            background: var(--stardew-dark-brown);
            color: var(--stardew-yellow);
            padding: 10px;
            margin: -20px -20px 15px -20px;
            text-align: center;
            font-size: 9px;
            border-bottom: 4px solid var(--stardew-gold-border);
        }

        .item-row {
            background: rgba(255, 255, 255, 0.2);
            margin: 5px 0;
            padding: 8px;
            border: 2px solid var(--stardew-dark-brown);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            cursor: help;
        }

        .item-row:hover { background: rgba(255, 255, 255, 0.4); }
        .item-row.completed { opacity: 0.4; background: rgba(77, 163, 60, 0.2); }

        .item-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.1); border-radius: 4px; position: relative;}

        .item-icon img {
            display: block !important;
            width: 24px;
            height: 24px;
            image-rendering: pixelated;
        }

        .quality-star {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 16px !important;
            height: 16px !important;
            z-index: 5;
        }

        .tooltip {
            visibility: hidden;
            position: fixed;
            z-index: 9999;
            background: var(--stardew-yellow);
            border: 3px solid var(--stardew-dark-brown);
            outline: 2px solid var(--stardew-gold-border);
            padding: 12px;
            width: 240px;
            color: var(--stardew-brown);
            font-size: 7px;
            line-height: 1.6;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transform: translate(-50%, -110%);
        }

        .item-row:hover .tooltip { visibility: visible; }

        .progress-bar { height: 12px; background: var(--stardew-dark-brown); border: 2px solid var(--stardew-gold-border); margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--stardew-green); width: 0%; transition: width 0.4s ease-out; }
        .season-tag { font-size: 6px; background: var(--stardew-dark-brown); color: var(--stardew-yellow); padding: 2px 4px; margin-left: auto; }
    </style>
</head>

    let activeRoom = "Global";

    function setSeason(season, btn) {
        activeSeason = season;
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        renderActiveRoom();
    }

    function changeRoom(room) {
        activeRoom = room;
        renderTabs();
        renderActiveRoom();
    }

    function renderTabs() {
        const container = document.getElementById('tab-container');
        container.innerHTML = `<button class="tab-btn ${activeRoom === 'Global' ? 'active' : ''}" onclick="changeRoom('Global')">ALL ROOMS</button>`;
        Object.keys(bundleData).forEach(room => {
            container.innerHTML += `<button class="tab-btn ${activeRoom === room ? 'active' : ''}" onclick="changeRoom('${room}')">${room.toUpperCase()}</button>`;
        });
    }

    function renderActiveRoom() {
        const container = document.getElementById('room-container');
        const hideDone = document.getElementById('hide-completed').checked;
        container.innerHTML = '';

        if (activeRoom === "Global") {
            const card = document.createElement('div');
            card.className = 'stardew-panel bundle-card';
            card.style.gridColumn = "1 / -1";
            card.innerHTML = `<div class="bundle-header">MASTER CHECKLIST</div><div id="master-list"></div>`;
            const list = card.querySelector('#master-list');

            Object.keys(bundleData).forEach(room => {
                Object.keys(bundleData[room]).forEach(bundleName => {
                    bundleData[room][bundleName].items.forEach(item => {
                        const storageId = `sd-${room}-${bundleName}-${item.name}`;
                        const isDone = localStorage.getItem(storageId) === 'true';
                        if (hideDone && isDone) return;
                        if (activeSeason === "All" || item.season.includes(activeSeason) || item.season === "All") {
                            list.appendChild(createItemRow(item, room, bundleName));
                        }
                    });
                });
            });
            container.appendChild(card);
        } else {
            Object.keys(bundleData[activeRoom]).forEach(bundleName => {
                const bundle = bundleData[activeRoom][bundleName];
                const card = document.createElement('div');
                card.className = 'stardew-panel bundle-card';
                card.innerHTML = `
                    <div class="bundle-header">${bundleName.toUpperCase()}</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                    <div class="item-list"></div>`;

                const list = card.querySelector('.item-list');
                bundle.items.forEach(item => {
                    const storageId = `sd-${activeRoom}-${bundleName}-${item.name}`;
                    const isDone = localStorage.getItem(storageId) === 'true';
                    if (hideDone && isDone) return;
                    if (activeSeason === "All" || item.season.includes(activeSeason) || item.season === "All") {
                        list.appendChild(createItemRow(item, activeRoom, bundleName));
                    }
                });
                if (list.children.length > 0) container.appendChild(card);
            });
        }
        updateAllBars();
    }

    function createItemRow(item, roomLabel, bundleName) {
        const row = document.createElement('div');
        const storageId = `sd-${roomLabel}-${bundleName}-${item.name}`;
        const isChecked = localStorage.getItem(storageId) === 'true';

        row.className = `item-row ${isChecked ? 'completed' : ''}`;
        row.onclick = () => toggleProgress(storageId, row);

        row.onmousemove = (e) => {
            const tooltip = row.querySelector('.tooltip');
            tooltip.style.left = e.clientX + 'px';
            tooltip.style.top = e.clientY + 'px';
        };

        const displayName = item.quality ? `5x ${item.name}` : item.name;

        row.innerHTML = `
            <input type="checkbox" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation()" onchange="toggleProgress('${storageId}', this.parentElement)">
            <div class="item-icon">
                <img src="${getIcon(item.name)}">
                ${item.quality ? `<img src="${getIcon('gold-star')}" class="quality-star">` : ''}
            </div>
            <span>${displayName}</span>
            <span class="season-tag">${item.season}</span>
            <div class="tooltip">
                <strong>📝 INFO:</strong><br>${item.loc}<br><br>
                <strong>🏠 BUNDLE:</strong><br>${bundleName} (${roomLabel})
            </div>`;
        return row;
    }

    function toggleProgress(id, row) {
        const checkbox = row.querySelector('input');
        const newState = !checkbox.checked;
        checkbox.checked = newState;
        localStorage.setItem(id, newState);
        row.classList.toggle('completed', newState);
        updateAllBars();

        if (document.getElementById('hide-completed').checked && newState) {
            setTimeout(renderActiveRoom, 400);
        }
    }

    function updateAllBars() {
        document.querySelectorAll('.bundle-card').forEach(card => {
            const boxes = card.querySelectorAll('input[type="checkbox"]');
            const checked = card.querySelectorAll('input:checked').length;
            const fill = card.querySelector('.progress-fill');
            if(fill && boxes.length > 0) {
                fill.style.width = (checked / boxes.length * 100) + '%';
            }
        });
    }

    window.onload = () => { renderTabs(); renderActiveRoom(); };
</script>
</body>
</html>
